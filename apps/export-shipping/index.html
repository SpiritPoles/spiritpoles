<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Export Shipping — UCS Spirit</title>
<script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
<style>
:root{--bg:#000;--tb:#252525;--tbd:rgba(255,255,255,0.2);--tbt:rgba(255,255,255,0.32);--thb:rgba(232,18,125,0.55);--tp:#ede6d8;--ts:rgba(255,255,255,0.55);--sl:rgba(255,255,255,0.4);--fc:#aeacae;--rc:#aeacae;--so:rgba(0,0,0,0.55);--shb:rgba(255,255,255,0.2);--tgb:rgba(255,255,255,0.08);--tgbr:rgba(255,255,255,0.14);--tgc:rgba(255,255,255,0.5);--tgh:rgba(255,255,255,0.85);--tc:rgba(255,255,255,0.55);--tt:rgba(232,18,125,0.5);--bgo:.18;--bgf:none;--pink:#E8127D;--green:#4caf50;--red:#e53935;--card:#1a1a1a}
body.light{--bg:#f4f4f4;--tb:#fff;--tbd:rgba(0,0,0,0.12);--tbt:rgba(0,0,0,0.22);--tp:#1a1a1a;--ts:rgba(0,0,0,0.45);--sl:rgba(0,0,0,0.35);--fc:#666;--so:rgba(240,240,240,0.65);--shb:rgba(0,0,0,0.12);--tgb:rgba(0,0,0,0.06);--tgbr:rgba(0,0,0,0.12);--tgc:rgba(0,0,0,0.4);--tgh:rgba(0,0,0,0.8);--tc:rgba(0,0,0,0.35);--tt:rgba(232,18,125,0.55);--bgo:.09;--bgf:invert(1);--card:#fff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tp);transition:background .25s}
body::before{content:'';position:fixed;inset:0;background:url(../flex-lookup/ucs-spirit-logo.png) no-repeat center center;background-size:280px;opacity:.03;filter:var(--bgf);pointer-events:none;z-index:0}
#wrap{max-width:780px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1}

/* Header */
.ph{text-align:center;margin-bottom:32px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tgc);text-decoration:none;margin-bottom:20px;transition:color .2s}
.back:hover{color:var(--pink)}
#pl{display:block;margin:0 auto 12px;width:180px;height:auto}
.rule{height:2px;background:linear-gradient(90deg,transparent,var(--rc),transparent);margin:0 auto 10px;max-width:260px}
.pt{font-size:13px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--pink)}
.ps{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--ts);margin-top:4px}
#mt{position:absolute;top:32px;right:20px;background:var(--tgb);border:1px solid var(--tgbr);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tgc);transition:all .2s}
#mt:hover{color:var(--tgh)}

/* Auth bar */
#auth-bar{background:var(--tgb);border:1px solid var(--tgbr);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.auth-status{font-size:12px;font-weight:600;color:var(--ts)}
.auth-user{font-size:12px;font-weight:700;color:var(--pink)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:800;letter-spacing:.06em;cursor:pointer;border:none;transition:all .18s}
.btn-primary{background:var(--pink);color:#fff}
.btn-primary:hover{background:#c40f6a}
.btn-primary:disabled{background:rgba(232,18,125,0.3);cursor:not-allowed}
.btn-outline{background:var(--tgb);border:1px solid var(--tgbr);color:var(--tgc)}
.btn-outline:hover{color:var(--tgh);border-color:var(--tbd)}
.btn-sm{padding:6px 12px;font-size:11px}

/* Section label */
.sl{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--sl);margin-bottom:12px;padding-left:2px}

/* Card */
.card{background:var(--tb);border:1px solid var(--tbd);border-top-color:var(--tbt);border-radius:14px;padding:20px;margin-bottom:20px}
.card-title{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--pink);margin-bottom:14px}

/* Form fields */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-row.tri{grid-template-columns:1fr 1fr 1fr}
.field-row.solo{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ts)}
.field input,.field select,.field textarea{background:var(--tgb);border:1px solid var(--tgbr);border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;color:var(--tp);outline:none;transition:border-color .18s;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(232,18,125,0.5)}
.field select option{background:#252525;color:#ede6d8}
.field textarea{resize:vertical;min-height:60px}

/* Pole rows */
#pole-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pole-row{display:grid;grid-template-columns:2fr 1fr 28px;gap:8px;align-items:center}
.pole-row input,.pole-row select{background:var(--tgb);border:1px solid var(--tgbr);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:600;color:var(--tp);outline:none;transition:border-color .18s;font-family:inherit;width:100%}
.pole-row input:focus,.pole-row select:focus{border-color:rgba(232,18,125,0.5)}
.pole-del{background:none;border:none;color:var(--ts);cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color .18s}
.pole-del:hover{color:var(--red)}
.pole-header{display:grid;grid-template-columns:2fr 1fr 28px;gap:8px;margin-bottom:4px}
.pole-header span{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ts)}

/* Forwarder toggles */
#ff-list{display:flex;flex-direction:column;gap:6px}
.ff-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--tgb);border:1px solid var(--tgbr);border-radius:8px;cursor:pointer;transition:border-color .18s}
.ff-row:hover{border-color:var(--tbd)}
.ff-row.active{border-color:rgba(232,18,125,0.4);background:rgba(232,18,125,0.06)}
.ff-cb{width:16px;height:16px;accent-color:var(--pink);cursor:pointer;flex-shrink:0}
.ff-name{font-size:13px;font-weight:700;color:var(--tp);flex:1}
.ff-email{font-size:11px;color:var(--ts)}

/* Packing preview */
#packing-preview{margin-top:14px}
.piece-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--tgb);border-radius:8px;margin-bottom:6px;font-size:12px;font-weight:600;color:var(--ts)}
.piece-tag{background:rgba(232,18,125,0.15);color:var(--pink);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:.08em;flex-shrink:0}
.piece-detail{flex:1}

/* Results */
#result-list{display:flex;flex-direction:column;gap:10px}
.result-row{padding:12px 16px;border-radius:10px;border:1px solid;display:flex;align-items:center;gap:12px}
.result-ok{border-color:rgba(76,175,80,0.3);background:rgba(76,175,80,0.07)}
.result-fail{border-color:rgba(229,57,53,0.3);background:rgba(229,57,53,0.07)}
.result-icon{font-size:16px;flex-shrink:0}
.result-name{font-size:13px;font-weight:700;color:var(--tp);flex:1}
.result-link{font-size:11px;font-weight:600;color:var(--pink);text-decoration:none}
.result-link:hover{text-decoration:underline}
.result-err{font-size:11px;color:var(--ts)}

/* Divider */
.divider{height:1px;background:var(--tgbr);margin:20px 0}

/* Log */
#log{font-size:11px;font-family:monospace;color:var(--ts);background:var(--tgb);border-radius:8px;padding:12px;max-height:120px;overflow-y:auto;margin-top:14px;display:none}

/* Totals */
.totals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.total-box{background:var(--tgb);border-radius:8px;padding:10px 12px;text-align:center}
.total-val{font-size:18px;font-weight:800;color:var(--pink)}
.total-lbl{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ts);margin-top:2px}

/* Action row */
.action-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:20px}

@media(max-width:540px){.field-row,.field-row.tri{grid-template-columns:1fr}.pole-row{grid-template-columns:1fr 1fr 28px}}
</style>
</head>
<body>
<div id="wrap">
  <button id="mt" onclick="toggleMode()"><span id="tl">Light</span></button>

  <!-- Header -->
  <div class="ph">
    <a class="back" href="/">&#8592; Back to Apps</a>
    <img id="pl" src="../flex-lookup/ucs-spirit-logo.png" alt="UCS Spirit">
    <div class="rule"></div>
    <div class="pt">Export Shipping</div>
    <div class="ps">Rate Request Draft Creator</div>
  </div>

  <!-- Auth bar -->
  <div id="auth-bar">
    <span class="auth-status" id="auth-label">Not signed in</span>
    <button class="btn btn-primary" id="signin-btn" onclick="handleSignIn()">&#128274; Sign in with Microsoft</button>

  <!-- Shipment Details -->

  <div class="card">
    <div class="card-title">Sales Order &amp; Consignee</div>
    <div class="field-row">
      <div class="field"><label>SO Number</label><input id="so" type="text" placeholder="e.g. 33868"></div>

    </div>
    <div class="field-row solo">
      <div class="field"><label>Consignee (short)</label><input id="consignee" type="text" placeholder="e.g. Aspire Academy"></div>
    </div>
    <div class="field-row solo">
      <div class="field"><label>Consignee Full Address</label><textarea id="consignee-full" placeholder="Full name, address, city, country..."></textarea></div>
    </div>
    <div class="field-row tri">

      <div class="field"><label>Goods Description</label><input id="goods-desc" type="text" value="Articles and equipment for general physical exercise, gymnastics or athletics; parts and accessories thereof"></div>
    </div>
  </div>

  <!-- Poles -->
  <div class="card">
    <div class="card-title">Poles</div>
    <div class="pole-header">

    </div>
    <div id="pole-list"></div>
    <button class="btn btn-outline btn-sm" onclick="addPoleRow()">+ Add Model</button>

    <!-- Packing preview -->
    <div class="divider"></div>
    <div class="card-title">Packing Preview</div>
    <div class="totals">
      <div class="total-box"><div class="total-val" id="t-pieces">—</div><div class="total-lbl">Pieces</div></div>
      <div class="total-box"><div class="total-val" id="t-poles">—</div><div class="total-lbl">Poles</div></div>
      <div class="total-box"><div class="total-val" id="t-weight">—</div><div class="total-lbl">Total kg</div></div>
    </div>
    <div id="packing-preview"></div>
  </div>

  <!-- Freight Forwarders -->
  <div class="card">
    <div class="card-title">Freight Forwarders</div>
    <div id="ff-list"></div>
    <div style="margin-top:10px;font-size:11px;color:var(--ts)">Internal CC: Steve Chappell &amp; Chris Chappell will be CC'd on all drafts.</div>
  </div>

  <!-- Action -->
  <div class="action-row">
    <button class="btn btn-primary" id="create-btn" onclick="createDrafts()" disabled>&#9993; Create Drafts in Outlook</button>
    <button class="btn btn-outline btn-sm" onclick="recalcPacking()">&#8635; Recalculate Packing</button>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// AZURE / MSAL CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: '7e13ec2f-5101-42d1-89a9-6644b2e16032',
    authority: 'https://login.microsoftonline.com/09457cd8-9608-4fa7-a52a-8811b6f29b49',
    redirectUri: 'https://spiritpoles.pages.dev/apps/export-shipping/',
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
};
const SCOPES = ['https://graph.microsoft.com/Mail.ReadWrite'];
const msalApp = new msal.PublicClientApplication(MSAL_CONFIG);
let currentAccount = null;

// ─────────────────────────────────────────────────────────────────────────────
// POLE DATA
// ─────────────────────────────────────────────────────────────────────────────
// Length in inches for each model
const POLE_LENGTH_IN = {
  235:112, 240:114, 245:116, 250:118, 255:120, 260:122, 265:124, 270:126,
  275:128, 280:130, 285:132, 290:134, 295:136, 300:138, 305:140, 310:142,
  315:144, 320:146, 325:148, 330:150, 335:152, 340:154, 345:156, 350:162,
  355:164, 360:166, 365:168, 370:174, 375:176, 380:178, 385:180, 390:182,
  395:184, 400:192, 405:194, 410:196, 415:198, 420:200, 425:202, 430:204,
  435:206, 440:208, 445:212, 450:214, 455:216, 460:218, 465:220, 470:222,
  475:226, 480:228, 485:230, 490:232, 495:234, 500:236, 505:238, 510:240,
  515:242, 520:244,
};
// Approximate air-shipment weight in lbs per model
const POLE_WEIGHT_LBS = {
  235:3.5, 240:3.8, 245:4.0, 250:4.2, 255:4.5, 260:4.7, 265:4.9, 270:5.1,
  275:5.3, 280:5.6, 285:5.8, 290:6.0, 295:6.3, 300:6.5, 305:6.7, 310:7.0,
  315:7.2, 320:7.5, 325:7.7, 330:8.0, 335:8.2, 340:8.5, 345:8.7, 350:9.0,
  355:9.3, 360:9.6, 365:9.9, 370:10.2, 375:10.5, 380:10.8, 385:11.1, 390:11.4,
  395:11.7, 400:12.5, 405:12.9, 410:13.2, 415:13.6, 420:14.0, 425:14.4, 430:14.8,
  435:15.2, 440:15.6, 445:16.0, 450:16.5, 455:16.9, 460:17.4, 465:17.8, 470:18.3,
  475:18.8, 480:19.3, 485:19.8, 490:20.3, 495:20.8, 500:21.3, 505:21.8, 510:22.4,
  515:22.9, 520:23.5,
};
const LARGE_TUBE = { w:8, h:8, extra_wt:35, extra_len:6, max:8 };
const SMALL_TUBE = { w:6, h:6, extra_wt:25, extra_len:6, max:4 };

const ALL_MODELS = Object.keys(POLE_LENGTH_IN).map(Number).sort((a,b)=>a-b);

// ─────────────────────────────────────────────────────────────────────────────
// FREIGHT FORWARDERS
// ─────────────────────────────────────────────────────────────────────────────
const FREIGHT_FORWARDERS = [
  { name:'AIT', to:'orders@ait.com', cc:[], active:true },
  { name:'Maersk / Pilot', to:'pilotchi@pilotdelivers.com', cc:['pilotsfo@pilotdelivers.com'], active:true },
  { name:'DSV', to:'dsv.chicago@dsv.com', cc:[], active:true },
  { name:'Global Shipping Services', to:'quotes@globalshippingservices.com', cc:[], active:true },
  { name:'Dynasty / Erixmar', to:'dynasty@erixmar.com', cc:['erixmar@erixmar.com'], active:true },
  { name:'SAIA', to:'quotes@saia.com', cc:[], active:true },
];
const INTERNAL_CC = ['stevechappell@ucsspirit.com', 'chrischappell@ucsspirit.com'];

// ─────────────────────────────────────────────────────────────────────────────
// PACKING ALGORITHM
// ─────────────────────────────────────────────────────────────────────────────
function packPoles(poleList) {
  // Expand to individual poles sorted by length desc
  const expanded = [];
  for (const { model, qty } of poleList) {
    const m = parseInt(model);
    for (let i = 0; i < qty; i++) expanded.push(m);
  }
  expanded.sort((a,b) => b - a);

  const pieces = [];
  let remaining = [...expanded];

  while (remaining.length > 0) {
    const tube = remaining.length >= 5 ? LARGE_TUBE : SMALL_TUBE;
    const batch = remaining.splice(0, tube.max);
    const longestModel = batch[0]; // sorted desc
    const tubeLen = (POLE_LENGTH_IN[longestModel] || 200) + tube.extra_len;
    const poleWt = batch.reduce((s, m) => s + (POLE_WEIGHT_LBS[m] || 10), 0);
    const totalWtLbs = Math.round((poleWt + tube.extra_wt) * 10) / 10;
    const totalWtKg  = Math.round(totalWtLbs * 0.453592 * 100) / 100;
    const cuFt = Math.round((tubeLen * tube.w * tube.h) / 1728 * 100) / 100;
    pieces.push({
      poles: batch,
      tube_length_in: tubeLen,
      tube_width_in: tube.w,
      tube_height_in: tube.h,
      weight_lbs: totalWtLbs,
      weight_kg: totalWtKg,
      cu_ft: cuFt,
      type: tube === LARGE_TUBE ? 'Large' : 'Small',
    });
  }
  return pieces;
}

// ─────────────────────────────────────────────────────────────────────────────
// EMAIL BUILDER
// ─────────────────────────────────────────────────────────────────────────────
const SHIPPER = {
  company: 'UCS Spirit / New Nevada Plastics',
  address: '2180 Meridian Blvd, Minden NV 89423',
  phone:   '775-882-7114',
  email:   'office@spiritpoles.com',
  hours:   'Monday–Friday, 7:00 AM – 4:00 PM Pacific',
  contact: 'Austin Tilley',
};

function buildEmail(ff, pieces) {
  const so       = v('so') || 'XXXXX';
  const cons     = v('consignee') || '(consignee)';
  const consFull = v('consignee-full') || cons;
  const method   = v('method');
  const incoterm = v('incoterm');
  const schedB   = v('schedule-b');
  const goodsD   = v('goods-desc');
  const goodsVal = v('goods-value');

  const totalPieces = pieces.length;
  const totalPoles  = pieces.reduce((s,p) => s + p.poles.length, 0);
  const totalKg     = pieces.reduce((s,p) => s + p.weight_kg, 0);
  const totalLbs    = pieces.reduce((s,p) => s + p.weight_lbs, 0);

  const dimsLines = pieces.map((p,i) =>
    `  Piece ${i+1} (${p.type}): ${p.tube_length_in}" L x ${p.tube_width_in}" W x ${p.tube_height_in}" H  |  ${p.weight_lbs} lbs (${p.weight_kg} kg)`
  ).join('\n');

  const subject = `Rate Request – SO${so} | Export ${method} | ${cons}`;

  const body = `Hello ${ff.name} Team,

We are requesting a shipping rate for the following export shipment. Please quote your best rate at your earliest convenience.

───────────────────────────────────────
  SHIPMENT DETAILS – SO${so}
───────────────────────────────────────

Consignee / Destination:
  ${consFull}

Shipping Incoterms:    ${incoterm}
Shipping Method:       ${method}
Schedule B / HS Code:  ${schedB}
Goods Description:     ${goodsD}
Declared Goods Value:  ${goodsVal}

Piece Count:     ${totalPieces} piece(s) — ${totalPoles} poles total
Total Weight:    ${Math.round(totalLbs*10)/10} lbs / ${Math.round(totalKg*100)/100} kg

Piece Dimensions & Weight:
${dimsLines}

───────────────────────────────────────
  PICKUP / SHIPPING DOCK
───────────────────────────────────────

${SHIPPER.company}
${SHIPPER.address}
Phone:   ${SHIPPER.phone}
Email:   ${SHIPPER.email}
Hours:   ${SHIPPER.hours}
Contact: ${SHIPPER.contact}

───────────────────────────────────────

Please reply with your rate, transit time, and any additional requirements.

Thank you,
Austin Tilley
Office Assistant
UCS Spirit | ${SHIPPER.phone} | ${SHIPPER.email}`;

  return { subject, body };
}

// ─────────────────────────────────────────────────────────────────────────────
// GRAPH API
// ─────────────────────────────────────────────────────────────────────────────
async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error('Not signed in');
  try {
    const res = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return res.accessToken;
  } catch {
    const res = await msalApp.acquireTokenPopup({ scopes: SCOPES });
    return res.accessToken;
  }
}

function toRecipients(addrs) {
  return addrs.filter(Boolean).map(a => ({ emailAddress: { address: a } }));
}

async function createDraftViaGraph(token, to, ccList, subject, body) {
  const payload = {
    subject,
    isDraft: true,
    body: { contentType: 'Text', content: body },
    toRecipients: toRecipients([to]),
    ccRecipients: toRecipients(ccList),
  };
  const resp = await fetch('https://graph.microsoft.com/v1.0/me/messages', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`Graph ${resp.status}: ${err.substring(0,200)}`);
  }
  return resp.json();
}

// ─────────────────────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function v(id) { return document.getElementById(id)?.value?.trim() || ''; }

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function getPoleRows() {
  const rows = document.querySelectorAll('.pole-row');
  const result = [];
  rows.forEach(row => {
    const model = row.querySelector('.pole-model')?.value;
    const qty   = parseInt(row.querySelector('.pole-qty')?.value) || 0;
    if (model && qty > 0) result.push({ model: parseInt(model), qty });
  });
  return result;
}

function getActiveFFs() {
  return FREIGHT_FORWARDERS.filter((ff,i) => {
    const cb = document.getElementById(`ff-cb-${i}`);
    return cb && cb.checked;
  });
}

function recalcPacking() {
  const rows = getPoleRows();
  if (!rows.length) {
    document.getElementById('packing-preview').innerHTML = '';
    document.getElementById('t-pieces').textContent = '—';
    document.getElementById('t-poles').textContent = '—';
    document.getElementById('t-weight').textContent = '—';
    return;
  }
  const pieces = packPoles(rows);
  document.getElementById('t-pieces').textContent = pieces.length;
  document.getElementById('t-poles').textContent  = pieces.reduce((s,p)=>s+p.poles.length,0);
  document.getElementById('t-weight').textContent  = Math.round(pieces.reduce((s,p)=>s+p.weight_kg,0)*100)/100 + ' kg';
  const preview = document.getElementById('packing-preview');
  preview.innerHTML = pieces.map((p,i) =>
    `<div class="piece-row">
      <span class="piece-tag">Piece ${i+1} · ${p.type}</span>
      <span class="piece-detail">${p.tube_length_in}" × ${p.tube_width_in}" × ${p.tube_height_in}" &nbsp;|&nbsp; ${p.weight_lbs} lbs · ${p.weight_kg} kg &nbsp;|&nbsp; ${p.poles.length} pole${p.poles.length>1?'s':''}</span>
    </div>`
  ).join('');
}

function addPoleRow(model='', qty=1) {
  const list = document.getElementById('pole-list');
  const row  = document.createElement('div');
  row.className = 'pole-row';
  const opts = ALL_MODELS.map(m => `<option value="${m}" ${m==model?'selected':''}>${m}</option>`).join('');
  row.innerHTML = `
    <select class="pole-model" onchange="recalcPacking()"><option value="">— Select Model —</option>${opts}</select>
    <input class="pole-qty" type="number" min="1" max="99" value="${qty}" onchange="recalcPacking()" oninput="recalcPacking()">
    <button class="pole-del" onclick="this.closest('.pole-row').remove();recalcPacking()">&#x2715;</button>`;
  list.appendChild(row);
  recalcPacking();
}

function buildFFList() {
  const el = document.getElementById('ff-list');
  el.innerHTML = FREIGHT_FORWARDERS.map((ff,i) => `
    <label class="ff-row ${ff.active?'active':''}" id="ff-row-${i}">
      <input type="checkbox" class="ff-cb" id="ff-cb-${i}" ${ff.active?'checked':''} onchange="updateFFRow(${i})">
      <span class="ff-name">${ff.name}</span>
      <span class="ff-email">${ff.to}</span>
    </label>`).join('');
}

function updateFFRow(i) {
  const cb  = document.getElementById(`ff-cb-${i}`);
  const row = document.getElementById(`ff-row-${i}`);
  row.classList.toggle('active', cb.checked);
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTH FLOW
// ─────────────────────────────────────────────────────────────────────────────
async function initMsal() {
  await msalApp.initialize();
  // Handle redirect response if returning from login
  const resp = await msalApp.handleRedirectPromise();
  if (resp) {
    currentAccount = resp.account;
    setAuthUI(currentAccount);
  } else {
    const accounts = msalApp.getAllAccounts();
    if (accounts.length) {
      currentAccount = accounts[0];
      setAuthUI(currentAccount);
    }
  }
}

function setAuthUI(account) {
  const label  = document.getElementById('auth-label');
  const btn    = document.getElementById('signin-btn');
  const create = document.getElementById('create-btn');
  if (account) {
    label.innerHTML  = `Signed in as <span class="auth-user">${account.username}</span>`;
    btn.textContent  = 'Sign out';
    btn.onclick      = handleSignOut;
    create.disabled  = false;
  } else {
    label.textContent = 'Not signed in';
    btn.innerHTML     = '&#128274; Sign in with Microsoft';
    btn.onclick       = handleSignIn;
    create.disabled   = true;
  }
}

async function handleSignIn() {
  try {
    const resp = await msalApp.loginPopup({ scopes: SCOPES, loginHint: 'office@spiritpoles.com' });
    currentAccount = resp.account;
    setAuthUI(currentAccount);
  } catch(e) {
    log('Sign-in error: ' + e.message);
  }
}

async function handleSignOut() {
  await msalApp.logoutPopup({ account: currentAccount });
  currentAccount = null;
  setAuthUI(null);
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN ACTION: CREATE DRAFTS
// ─────────────────────────────────────────────────────────────────────────────
async function createDrafts() {
  const poleRows = getPoleRows();
  if (!poleRows.length) { alert('Add at least one pole model first.'); return; }
  if (!v('so'))         { alert('Enter a Sales Order number.'); return; }
  if (!v('consignee'))  { alert('Enter a Consignee name.'); return; }

  const activeFFs = getActiveFFs();
  if (!activeFFs.length) { alert('Select at least one freight forwarder.'); return; }

  const pieces = packPoles(poleRows);
  let token;
  try { token = await getToken(); }
  catch(e) { log('Auth error: ' + e.message); return; }

  const createBtn = document.getElementById('create-btn');
  createBtn.disabled = true;
  createBtn.textContent = 'Creating drafts…';
  document.getElementById('log').textContent = '';
  document.getElementById('results-section').style.display = 'none';

  const results = [];
  for (const ff of activeFFs) {
    log(`Creating draft for ${ff.name}…`);
    const { subject, body } = buildEmail(ff, pieces);
    const ccList = [...(ff.cc || []), ...INTERNAL_CC.filter(e => e !== ff.to)];
    try {
      const msg = await createDraftViaGraph(token, ff.to, ccList, subject, body);
      log(`✅ Done — ${ff.name}`);
      results.push({ ff, ok: true, link: msg.webLink });
    } catch(e) {
      log(`❌ Failed — ${ff.name}: ${e.message}`);
      results.push({ ff, ok: false, err: e.message });
    }
  }

  // Show results
  document.getElementById('results-section').style.display = 'block';
  const rl = document.getElementById('result-list');
  rl.innerHTML = results.map(r => r.ok
    ? `<div class="result-row result-ok">
        <span class="result-icon">&#10003;</span>
        <span class="result-name">${r.ff.name}</span>
        <a class="result-link" href="${r.link}" target="_blank">Open in Outlook &#8594;</a>
       </div>`
    : `<div class="result-row result-fail">
        <span class="result-icon">&#10007;</span>
        <span class="result-name">${r.ff.name}</span>
        <span class="result-err">${r.err}</span>
       </div>`
  ).join('');

  createBtn.disabled = false;
  createBtn.innerHTML = '&#9993; Create Drafts in Outlook';
}

// ─────────────────────────────────────────────────────────────────────────────
// DARK / LIGHT TOGGLE
// ─────────────────────────────────────────────────────────────────────────────
function toggleMode() {
  const light = document.body.classList.toggle('light');
  document.getElementById('tl').textContent = light ? 'Dark' : 'Light';
  localStorage.setItem('mode', light ? 'light' : 'dark');
}
if (localStorage.getItem('mode') === 'light') {
  document.body.classList.add('light');
  document.addEventListener('DOMContentLoaded', () => {
    const tl = document.getElementById('tl');
    if (tl) tl.textContent = 'Dark';
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  // Set today's date as default
  document.getElementById('ship-date').valueAsDate = new Date();
  // Add one starter pole row
  addPoleRow();
  // Build forwarder list
  buildFFList();
  // Init MSAL
  await initMsal();
});
</script>
